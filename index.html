<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antvic Purchasing &amp; Invoice System</title>
<style>
:root{
  --orange:#E8632A; --navy:#0D1B2E; --navy2:#1A2D47;
  --zebra:#F4F7FC; --border:#CBD5E0; --bg:#F3F5F8; --panel:#FFFFFF;
  --text:#1F2933; --muted:#6B7686; --grey:#7C8A9A;
  --intro-bg:#F4F7FC; --intro-txt:#3C4A5A; --stop-bg:#FFF3EC; --callout-label:#0F1923;
  --green:#15803D; --green-bg:#DCFCE7;
  --red:#B91C1C; --red-bg:#FEE2E2;
  --amber:#B45309; --amber-bg:#FEF3C7;
  --blue:#1D4ED8; --blue-bg:#DBEAFE;
  --purple:#7E22CE; --purple-bg:#F3E8FF;
  --teal:#0F766E; --teal-bg:#CCFBF1;
  --slate:#475569; --slate-bg:#E2E8F0;
  --input-bg:#FBFCFE;
  --radius:8px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;color:var(--text);background:var(--bg);font-size:14px;}
h1,h2,h3{color:var(--navy);margin:0 0 8px 0;}
a{color:var(--orange);}
button{font-family:inherit;cursor:pointer;}
.btn{background:var(--navy2);color:#fff;border:none;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:bold;letter-spacing:.2px;}
.btn:hover{background:var(--navy);}
.btn-orange{background:var(--orange);}
.btn-orange:hover{background:#d1541e;}
.btn-outline{background:#fff;color:var(--navy2);border:1px solid var(--border);}
.btn-outline:hover{background:var(--zebra);}
.btn-danger{background:#fff;color:var(--red);border:1px solid var(--red);}
.btn-danger:hover{background:var(--red-bg);}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:5px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* ---------- masthead (Antvic H&S document style) ---------- */
#siteHeader{position:sticky;top:0;z-index:50;background:#fff;}
#topbar{background:#fff;color:var(--text);padding:14px 24px 12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  border-bottom:3px solid var(--orange);}
#topbar img{height:36px;display:block;cursor:pointer;}
#topbar .masthead-text{display:flex;flex-direction:column;gap:4px;}
#topbar .eyebrow{font-size:11px;font-weight:bold;color:var(--orange);text-transform:uppercase;letter-spacing:1.4px;}
#topbar .tag{font-size:11px;color:var(--grey);}
#topbar .spacer{flex:1;}
#topbar .btn{border:1px solid var(--border);color:var(--navy2);background:#fff;}
#topbar .btn:hover{background:var(--zebra);}
nav#tabs{display:flex;gap:2px;flex-wrap:wrap;background:#fff;padding:0 20px;border-bottom:1px solid var(--border);}
nav#tabs button{background:transparent;border:none;border-bottom:3px solid transparent;padding:13px 14px 10px;font-size:13px;font-weight:bold;color:var(--muted);}
nav#tabs button.active{color:var(--navy);border-bottom-color:var(--orange);}
nav#tabs button:hover:not(.active){color:var(--navy2);}
.hamburger{display:none;background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:18px;color:var(--navy2);line-height:1;margin-left:auto;}
.hamburger:hover{background:var(--zebra);}
@media(max-width:900px){
  .hamburger{display:inline-block;}
  #topbar .tag{display:none;}
  nav#tabs{display:none;position:absolute;top:100%;left:0;right:0;width:100%;flex-direction:column;padding:6px 14px 12px;
    background:#fff;border-bottom:3px solid var(--orange);box-shadow:0 12px 24px rgba(13,27,46,.18);z-index:60;}
  nav#tabs.open{display:flex;}
  nav#tabs button{width:100%;text-align:left;border-bottom:1px solid var(--border);border-left:3px solid transparent;padding:13px 10px;font-size:14px;}
  nav#tabs button:last-child{border-bottom:none;}
  nav#tabs button.active{border-bottom-color:var(--border);border-left-color:var(--orange);background:var(--zebra);}
}

main{max-width:1320px;margin:0 auto;padding:20px;}
main.wide{max-width:1780px;}
.budgetInput::-webkit-outer-spin-button,.budgetInput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.budgetInput{-moz-appearance:textfield;appearance:textfield;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px;}
.panel h2{font-size:16px;border-bottom:2px solid var(--orange);padding-bottom:8px;margin-bottom:14px;}
.panel .sub{background:var(--intro-bg);border-left:4px solid var(--navy);color:var(--intro-txt);
  font-size:12px;line-height:1.55;padding:9px 13px;margin:-2px 0 16px 0;border-radius:0 5px 5px 0;}

.grid{display:grid;gap:14px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr 1fr;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-6{grid-template-columns:repeat(6,1fr);}
@media(max-width:900px){.grid-2,.grid-3,.grid-4,.grid-6{grid-template-columns:1fr 1fr;}}

label{display:block;font-size:11px;font-weight:bold;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);
  font-family:inherit;font-size:13px;color:var(--text);transition:border-color .15s ease,box-shadow .15s ease;}
input:hover,select:hover,textarea:hover{border-color:#A9B4C2;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,99,42,.15);}
textarea{resize:vertical;min-height:50px;}
.field{margin-bottom:12px;}
.field.readonly input{background:#F1F2F4;color:var(--muted);}

table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--navy2);color:#fff;text-align:left;padding:10px 10px;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;}
tbody td{padding:11px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5;}
tbody tr:nth-child(even){background:var(--zebra);}
tbody tr:hover{background:#EAF0FA;}
.table-wrap{overflow-x:auto;}
tfoot td{font-weight:bold;background:#E9EEF5;border-top:2px solid var(--navy2);}

.chip{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:bold;letter-spacing:.2px;line-height:1.5;}
.chip-green{background:var(--green-bg);color:var(--green);}
.chip-red{background:var(--red-bg);color:var(--red);}
.chip-amber{background:var(--amber-bg);color:var(--amber);}
.chip-gray{background:#E5E7EB;color:#4B5563;}
.chip-blue{background:var(--blue-bg);color:var(--blue);}
.chip-purple{background:var(--purple-bg);color:var(--purple);}
.chip-teal{background:var(--teal-bg);color:var(--teal);}
.chip-slate{background:var(--slate-bg);color:var(--slate);}
.chip-urgent{background:var(--red);color:#fff;text-transform:uppercase;letter-spacing:.4px;}
tr.urgentRow td{background:var(--stop-bg);}
tr.urgentRow:hover td{background:#FCE3D6;}

.stat-cards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px;}
@media(max-width:1100px){.stat-cards{grid-template-columns:repeat(3,1fr);}}
@media(max-width:640px){.stat-cards{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:#fff;border:1px solid var(--border);border-left:4px solid var(--orange);border-radius:6px;padding:12px 14px;}
.stat-card .n{font-size:24px;font-weight:bold;color:var(--navy);}
.stat-card .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}

.toolbar{display:flex;gap:8px;align-items:end;flex-wrap:wrap;margin-bottom:14px;}
.toolbar .field{margin-bottom:0;min-width:150px;flex:1;}
.toolbar .grow{flex:2;}

.pill-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.pill{background:var(--zebra);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 12px;font-size:12px;display:flex;align-items:center;gap:6px;}
.pill button{background:none;border:none;color:var(--red);font-weight:bold;padding:0 2px;font-size:13px;line-height:1;}

.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:12px 18px;border-radius:6px;
  border-left:4px solid var(--orange);box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:200;font-size:13px;font-weight:bold;
  opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

.modal-bg{position:fixed;inset:0;background:rgba(13,27,46,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:#fff;border-radius:8px;max-width:960px;width:100%;max-height:92vh;overflow:auto;padding:22px 26px;position:relative;}
.modal .close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:var(--muted);}

.footnote{color:var(--muted);font-size:11px;margin-top:6px;}
.section-head{background:var(--orange);color:#fff;font-weight:bold;padding:6px 10px;border-radius:4px;margin:14px 0 6px 0;font-size:12px;}
td.line-actions{white-space:nowrap;}
.line-actions .btn{margin:0 6px 4px 0;}
.line-actions .btn:last-child{margin-right:0;}
.right{text-align:right;}
.center{text-align:center;}
.mono{font-variant-numeric:tabular-nums;}
.empty{padding:26px;text-align:center;color:var(--muted);font-style:italic;}

.callout{background:var(--stop-bg);border:1px solid var(--orange);border-left:5px solid var(--orange);border-radius:4px;
  padding:9px 13px;font-size:12px;color:var(--intro-txt);margin:0 0 14px 0;}
.callout b{color:var(--callout-label);text-transform:uppercase;letter-spacing:.4px;font-size:11px;}

/* ---------- Purchase order print sheet ---------- */
#poSheet{background:#fff;padding:34px 40px;max-width:850px;margin:0 auto;border:1px solid var(--border);}
#poSheet .po-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--orange);padding-bottom:14px;margin-bottom:16px;}
#poSheet .po-head img{height:46px;}
#poSheet .po-title{font-size:20px;font-weight:bold;color:var(--navy);letter-spacing:1px;}
#poSheet .meta-box{text-align:right;font-size:12px;}
#poSheet .meta-box .lbl{color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:bold;}
#poSheet .meta-box .val{font-weight:bold;color:var(--navy);margin-bottom:6px;}
#poSheet .addr{font-size:11px;color:var(--muted);margin-top:4px;}
#poSheet .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:18px;}
#poSheet .lbl{color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:bold;letter-spacing:.3px;}
#poSheet .val{font-weight:bold;color:var(--navy);font-size:13px;}
#poSheet table{margin-top:8px;}
#poSheet thead th{position:static;background:var(--navy2);}
#poSheet tfoot td{background:transparent;border:none;}
#poSheet .grand{background:var(--navy2)!important;color:#fff!important;font-weight:bold;}
#poSheet .notes{margin-top:20px;font-size:11px;color:var(--muted);white-space:pre-line;border-top:1px solid var(--border);padding-top:12px;}
#poSheet .sign{margin-top:26px;font-size:12px;font-weight:bold;color:var(--navy);}
#poSheet .po-footer{margin-top:30px;border-top:3px solid var(--orange);padding-top:10px;text-align:center;font-size:10.5px;color:var(--muted);line-height:1.7;}

#printArea{display:none;}
@media print{
  @page { size: A4; margin: 9mm 11mm; }
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible; -webkit-print-color-adjust:exact; print-color-adjust:exact; color-adjust:exact;}
  #printArea{display:block !important; position:absolute; top:0; left:0; width:100%; margin:0; padding:0;}
  #poSheet{border:none; max-width:100%; margin:0; padding:0 0 52px 0; font-size:11px;}
  #poSheet .po-head{padding-bottom:8px; margin-bottom:10px;}
  #poSheet .po-head img{height:36px;}
  #poSheet .po-title{font-size:15px;}
  #poSheet .meta-box{font-size:10.5px;}
  #poSheet .meta-box .val{margin-bottom:3px;}
  #poSheet .two-col{gap:12px; margin-bottom:10px;}
  #poSheet .val{font-size:11.5px;}
  #poSheet table{font-size:10.5px; margin-top:4px;}
  #poSheet thead th{padding:5px 6px; font-size:9.5px; letter-spacing:.2px;}
  #poSheet tbody td{padding:4px 6px; line-height:1.35;}
  #poSheet tfoot td{padding:3px 6px;}
  #poSheet .notes{margin-top:10px; padding-top:8px; font-size:9.5px;}
  #poSheet .sign{margin-top:14px; font-size:11px;}
  #poSheet .footnote{font-size:9px; margin-top:3px;}
  #poSheet .po-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;margin-top:0;padding-top:6px;font-size:9px;line-height:1.5;}
}
/* ---------- status dots, pulses, product links ---------- */
.sdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle;flex:none;}
.sdot.pulse{animation:sdotPulse 1.6s ease-out infinite;}
@keyframes sdotPulse{0%{box-shadow:0 0 0 0 currentColor;}70%{box-shadow:0 0 0 7px rgba(0,0,0,0);}100%{box-shadow:0 0 0 0 rgba(0,0,0,0);}}
.chip .sdot{width:7px;height:7px;margin-right:5px;}
.chip-urgent{animation:urgentPulse 1.3s ease-in-out infinite;}
@keyframes urgentPulse{0%,100%{box-shadow:0 0 0 0 rgba(176,42,35,.45);}50%{box-shadow:0 0 0 6px rgba(176,42,35,0);}}
@media (prefers-reduced-motion: reduce){.sdot.pulse,.chip-urgent{animation:none;}}

/* ---------- stacked cards for tables on small screens ---------- */
@media(max-width:760px){
  table.stackable, table.stackable tbody{display:block;width:100%;}
  table.stackable thead, table.stackable tfoot{display:none;}
  table.stackable tbody tr{display:block;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;padding:10px 12px;background:#fff;}
  table.stackable tbody tr:nth-child(even){background:#fff;}
  table.stackable tbody tr:hover{background:#fff;}
  table.stackable tbody td{display:block;border:none;padding:5px 0;max-width:none;min-width:0;}
  table.stackable tbody td.right{text-align:left;}
  table.stackable tbody td.descCell{min-width:0;}
  table.stackable tbody td[data-label]::before{content:attr(data-label);display:block;font-size:10px;font-weight:bold;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
  table.stackable tbody td[data-label='']::before{display:none;}
  table.stackable .line-actions{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--border);margin-top:4px;}
  table.stackable tbody tr.urgentRow{background:var(--stop-bg);border-color:var(--orange);}
  table.stackable tbody tr.urgentRow td, table.stackable tbody tr.urgentRow:hover td{background:transparent;}
  table.stackable tbody td .btn{width:auto;}
  table.stackable td.empty{border:none;}
}
.prodLinkWrap{margin-top:4px;font-size:12px;}
.prodLink{font-weight:bold;color:var(--navy2);}
.descText{font-weight:600;color:var(--navy);line-height:1.5;display:block;}
.ja-item{border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:10px;background:#FBFCFE;}
.ja-item .ja-title{font-weight:bold;color:var(--navy);font-size:13.5px;line-height:1.45;margin-bottom:3px;}
.ja-item .ja-meta{color:var(--muted);font-size:12px;margin-bottom:8px;}
.ja-item .ja-chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
td.descCell{min-width:230px;max-width:440px;}

/* ---------- keep inputs usable inside tables (mobile fix) ---------- */
tbody td input:not([type=checkbox]),tbody td select{min-width:82px;}
tbody td input.siteName{min-width:170px;}
tbody td input.siteAddr{min-width:210px;}
tbody td input.limRole{min-width:170px;}
tbody td input.limUpto{min-width:120px;}

/* ---------- small-screen polish ---------- */
@media(max-width:640px){
  main{padding:12px;}
  .panel{padding:14px;}
  #topbar{padding:10px 14px 9px;gap:10px;}
  #topbar img{height:30px;}
  #topbar .eyebrow{font-size:10px;letter-spacing:1px;}
  .stat-card .n{font-size:19px;}
  .grid-2,.grid-3,.grid-4,.grid-6{grid-template-columns:1fr;}
  .toolbar .field{min-width:130px;}
  .modal{padding:16px 14px;}
  thead th{white-space:nowrap;}
}
.hidden{display:none!important;}
</style>
</head>

const COST_CODE_SECTIONS = [["1 — Site & Preliminaries", [["STAFF", "Management & site staff"], ["MGT", "Site overhead, H&S & compliance"], ["PERMIT", "Statutory licences & permits"], ["SCAF", "Scaffolding & access"], ["PLANT", "Plant, tools & hoisting"], ["CLEAN", "Cleaning (site & handover)"], ["WASTE", "Skips & waste removal"], ["WELF", "Welfare & site establishment"], ["TEMP", "Temporary works & services"], ["CONSUM", "PPE & consumables"], ["SITE-OTH", "Other preliminaries"]]], ["2 — Substructure & Frame", [["DEM", "Demolition & strip-out"], ["GWKS", "Groundworks, excavation & foundations"], ["DRAIN", "Drainage (below ground)"], ["CONC", "Concrete & RC frame"], ["STEEL", "Structural steel"], ["WPROOF", "Waterproofing & tanking"], ["SUB-OTH", "Other substructure / frame"]]], ["3 — Envelope", [["BRICK", "Brick & blockwork"], ["CLAD", "Cladding & façade"], ["ROOF", "Roofing"], ["WIND", "Windows & external doors"], ["ENV-OTH", "Other envelope"]]], ["4 — Internal", [["DRYL", "Drylining, partitions & ceilings"], ["SCREED", "Screeds & floor build-ups"], ["FLOOR", "Floor finishes"], ["TILE", "Tiling & wall finishes (wet)"], ["CARP", "Carpentry, joinery & internal doors"], ["DECOR", "Painting & decorating"], ["FFE", "Fittings, furniture & equipment"], ["INT-OTH", "Other internal & finishes"]]], ["5 — MEP / Services", [["MECH", "Mechanical, plumbing & heating"], ["VENT", "Ventilation"], ["ELEC", "Electrical"], ["FIRE", "Fire protection"], ["LIFT", "Lifts"], ["SEC", "Security, AV & data"], ["MEP-OTH", "Other MEP / services"]]], ["6 — External Works", [["EXT", "External works & landscaping"], ["EXT-OTH", "Other external"]]], ["7 — Project & Commercial (office use)", [["FEES", "Professional fees & surveys"], ["OHP", "Overheads & profit"], ["RISK", "Risk & contingency"], ["INS", "Bonds, insurances & warranties"], ["VAR", "Variations / change control"], ["COM-OTH", "Other project / commercial"]]]];
const DEFAULTS = {"suppliers": ["Amazon", "Claygate", "Frameclad", "Hafele", "Hapworth", "Hilti", "Jewson", "Leabridge", "Medlock", "Orbital Fasteners", "Phoenix", "Premdor", "Premier", "Reina", "Screwfix"], "sites": [{"name": "Caldecotte Lake", "code": "CL", "address": "Building 01, Caldecotte Lake Drive, Milton Keynes MK7 8LE"}], "orderPlacers": ["Illia", "Artur", "Olesia", "Dmitrii"], "units": ["Pallets", "Box", "Bags 25kg", "Bulk bags", "Litres", "Pack", "Pcs", "Length", "Sheets", "SQM", "L.M.", "Item", "Kit", "Set", "Kg"], "deliveryStatus": [{"code": "O", "label": "Ordered"}, {"code": "P", "label": "Purchased"}, {"code": "D", "label": "Delivered"}, {"code": "ND", "label": "Not Delivered"}, {"code": "R/C", "label": "Refunded / Cancelled"}, {"code": "PD", "label": "Partly Delivered"}, {"code": "SP", "label": "In Store Purchase"}], "approvalLimits": [{"tier": 1, "role": "Site Supervisor / Foreman", "upTo": 250}, {"tier": 2, "role": "Site Manager", "upTo": 2000}, {"tier": 3, "role": "Project Manager", "upTo": 10000}, {"tier": 4, "role": "Commercial Manager / QS", "upTo": 50000}, {"tier": 5, "role": "Director", "upTo": null}], "companyName": "Antvic Ltd", "companyAddress": "Office 286, 96 Kensington High Street, London W8 4SG", "companyPhone": "020 7433 3744", "companyEmail": "info@antvic.com"};
const FLAT_CODES = COST_CODE_SECTIONS.flatMap(function(s){ return s[1].map(function(c){ return {code:c[0], desc:c[1], section:s[0]}; }); });

function uid(){ return 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function todayISO(){ var d=new Date(); return d.toISOString().slice(0,10); }
function money(n){ n = Number(n)||0; return '£' + n.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function moneyShort(n){ n = Number(n)||0; return '£' + n.toLocaleString('en-GB',{maximumFractionDigits:0}); }
function fmtDate(iso){ if(!iso) return ''; var d = new Date(iso); if(isNaN(d)) return iso; return d.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function esc(s){ return (s===undefined||s===null)?'':String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function num(v){ var n = parseFloat(v); return isNaN(n)?0:n; }

var state = null;

function defaultState(){
  return {
    settings: {
      suppliers: DEFAULTS.suppliers.slice(),
      sites: JSON.parse(JSON.stringify(DEFAULTS.sites)),
      orderPlacers: DEFAULTS.orderPlacers.slice(),
      units: DEFAULTS.units.slice(),
      deliveryStatus: JSON.parse(JSON.stringify(DEFAULTS.deliveryStatus)),
      approvalLimits: JSON.parse(JSON.stringify(DEFAULTS.approvalLimits)),
      budgets: {},
      supplierContacts: {},
      companyName: DEFAULTS.companyName,
      companyAddress: DEFAULTS.companyAddress,
      companyPhone: DEFAULTS.companyPhone,
      companyEmail: DEFAULTS.companyEmail
    },
    orders: [],
    pos: [],
    invoices: [],
    counters: { poSeqBySite:{}, orderSeq: 1 },
    ui: { activeTab:'dashboard', dashboardSite:'ALL', orderFilters:{}, poFilters:{}, invFilters:{}, summarySite:'ALL', poDraft:null }
  };
}

function load(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ state = JSON.parse(raw); }
    else { state = defaultState(); }
  }catch(e){ state = defaultState(); }
  // backfill any newly added settings fields for older saves
  var d = defaultState();
  state.settings = Object.assign({}, d.settings, state.settings||{});
  if(!state.counters) state.counters = d.counters;
  if(!state.ui) state.ui = d.ui;
  if(!state.settings.budgets) state.settings.budgets = {};
  if(!state.settings.supplierContacts) state.settings.supplierContacts = {};
  migrateStatuses();
}

function migrateStatuses(){
  var had = state.settings.deliveryStatus.some(function(s){ return s.code==='TBO'; });
  if(had){
    state.settings.deliveryStatus = state.settings.deliveryStatus.filter(function(s){ return s.code!=='TBO'; });
    state.orders.forEach(function(o){ if(o.status==='TBO') o.status = 'O'; });
    save();
  }
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

function approvalFor(value){
  var limits = state.settings.approvalLimits.slice().sort(function(a,b){ return a.tier-b.tier; });
  for(var i=0;i<limits.length;i++){
    var lim = limits[i];
    if(lim.upTo===null || lim.upTo===undefined || value<=lim.upTo){
      return { tier: lim.tier, role: lim.role };
    }
  }
  var last = limits[limits.length-1];
  return { tier:last.tier, role:last.role };
}

function siteByName(name){ return state.settings.sites.find(function(s){ return s.name===name; }); }
function siteCode(name){ var s = siteByName(name); return s ? s.code : (name||'GEN').slice(0,3).toUpperCase(); }

function nextOrderNo(){ var n = state.counters.orderSeq++; return n; }
function nextPoNo(site){
  var code = siteCode(site);
  if(!state.counters.poSeqBySite[code]) state.counters.poSeqBySite[code] = 0;
  state.counters.poSeqBySite[code]++;
  var seq = state.counters.poSeqBySite[code];
  return code + '-' + String(seq).padStart(4,'0');
}

function statusLabel(codeVal){
  var m = state.settings.deliveryStatus.find(function(s){ return s.code===codeVal; });
  return m ? m.label : codeVal;
}
function statusChipClass(codeVal){
  var map = {'O':'chip-red','P':'chip-amber','D':'chip-green','ND':'chip-red','R/C':'chip-slate','PD':'chip-teal','SP':'chip-gray'};
  return map[codeVal] || 'chip-gray';
}
var STATUS_COLORS = {'O':'#DC2626','P':'#D97706','D':'#16A34A','ND':'#B91C1C','R/C':'#475569','PD':'#65A30D','SP':'#64748B'};
var PULSING_STATUSES = {'O':1,'P':1,'PD':1,'ND':1};
function dotFor(color, pulse){
  return '<span class="sdot'+(pulse?' pulse':'')+'" style="background:'+color+';color:'+color+';"></span>';
}
function statusDotHtml(code){
  var col = STATUS_COLORS[code] || '#7C8A9A';
  return dotFor(col, !!PULSING_STATUSES[code]);
}
function statusChip(code){
  return '<span class="chip '+statusChipClass(code)+'">'+statusDotHtml(code)+esc(statusLabel(code))+'</span>';
}
function payDotColor(st){
  if(st==='Paid') return '#1E7E34';
  if(st==='Queried / On Hold') return '#B02A23';
  if(st==='Approved for Payment') return '#8A6D1F';
  return '#7C8A9A';
}
function dueBadge(o){
  if(!o.estDelivery || o.status==='D' || o.status==='R/C') return '';
  var overdue = o.estDelivery < todayISO();
  return '<div style="font-size:10.5px;margin-top:3px;font-weight:bold;color:'+(overdue?'var(--red)':'var(--muted)')+';">'+(overdue?'&#9888; Overdue &mdash; was due ':'Due ')+fmtDate(o.estDelivery)+'</div>';
}
function approvalChipClass(st){
  if(st==='Approved') return 'chip-green';
  if(st==='Rejected') return 'chip-red';
  return 'chip-amber';
}
function payChipClass(st){
  if(st==='Paid') return 'chip-green';
  if(st==='Queried / On Hold') return 'chip-red';
  if(st==='Approved for Payment') return 'chip-amber';
  return 'chip-gray';
}

function poById(id){ return state.pos.find(function(p){ return p.id===id; }); }
function orderById(id){ return state.orders.find(function(o){ return o.id===id; }); }

/* PO helpers: net value, cost-code breakdown */
function poSubtotal(po){ return po.lines.reduce(function(s,l){ return s + num(l.total); },0); }
function poTotals(po){
  var subtotal = poSubtotal(po);
  var vat = subtotal * 0.20;
  var discount = subtotal * (num(po.discountPct)/100);
  var total = subtotal + vat - discount;
  return {subtotal:subtotal, vat:vat, discount:discount, total:total};
}
function poCostBreakdown(po){
  var map = {};
  po.lines.forEach(function(l){
    var c = l.costCode || 'SITE-OTH';
    map[c] = (map[c]||0) + num(l.total);
  });
  return map;
}
function invoiceApportionment(inv){
  var po = poById(inv.poId);
  if(!po) return {};
  var breakdown = poCostBreakdown(po);
  var subtotal = poSubtotal(po);
  var ratio = subtotal>0 ? (num(inv.net)/subtotal) : 0;
  var out = {};
  Object.keys(breakdown).forEach(function(code){ out[code] = breakdown[code]*ratio; });
  return out;
}
function invoicesForPo(poId){ return state.invoices.filter(function(i){ return i.poId===poId; }); }
function poInvoicedTotal(poId){ return invoicesForPo(poId).reduce(function(s,i){ return s+num(i.net); },0); }
function poPaidTotal(poId){ return invoicesForPo(poId).filter(function(i){ return i.paymentStatus==='Paid'; }).reduce(function(s,i){ return s+num(i.net); },0); }

function switchTab(tab){
  if(tab==='settings') tab='dashboard'; /* settings now live on the dashboard */
  state.ui.activeTab = tab;
  document.querySelectorAll('#tabs button').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab); });
  render();
}

function render(){
  var app = document.getElementById('app');
  var tab = state.ui.activeTab;
  app.classList.toggle('wide', tab==='summary');
  if(tab==='dashboard') app.innerHTML = renderDashboard();
  else if(tab==='neworder') app.innerHTML = renderNewOrder();
  else if(tab==='orders') app.innerHTML = renderOrders();
  else if(tab==='pos') app.innerHTML = renderPOs();
  else if(tab==='invoices') app.innerHTML = renderInvoices();
  else if(tab==='summary') app.innerHTML = renderSummary();
  else if(tab==='settings') app.innerHTML = renderSettings();
  wireTabEvents(tab);
}

function renderDashboard(){
  var dashSite = state.ui.dashboardSite || 'ALL';
  var dOrders = state.orders.filter(function(o){ return dashSite==='ALL' || o.site===dashSite; });
  var dPos = state.pos.filter(function(p){ return dashSite==='ALL' || p.site===dashSite; });
  var dPoIds = {}; dPos.forEach(function(p){ dPoIds[p.id]=true; });
  var dInvoices = state.invoices.filter(function(i){ return dPoIds[i.poId]; });

  var openOrders = dOrders.filter(function(o){ return o.status!=='D' && o.status!=='R/C'; }).length;
  var pendingApproval = dPos.filter(function(p){ return p.approvalStatus==='Pending'; }).length;
  var committed = dPos.filter(function(p){ return p.approvalStatus!=='Rejected'; })
    .reduce(function(s,p){ return s + poTotals(p).total; },0);
  var requestedSpend = dOrders.filter(function(o){ return !o.poId && o.status!=='R/C'; })
    .reduce(function(s,o){ return s + num(o.qty)*num(o.estUnitPrice); },0);
  var invoicedTotal = dInvoices.reduce(function(s,i){ return s+num(i.net)+num(i.vat); },0);
  var flagged = dInvoices.filter(function(i){ return invoiceFlag(i)==='CHECK'; }).length;

  var recentOrders = dOrders.slice().sort(function(a,b){ return (b.orderDate||'').localeCompare(a.orderDate||''); }).slice(0,8);

  var byCode = {};
  dPos.forEach(function(p){
    if(p.approvalStatus==='Rejected') return;
    var bd = poCostBreakdown(p);
    Object.keys(bd).forEach(function(c){ byCode[c]=(byCode[c]||0)+bd[c]; });
  });
  dOrders.forEach(function(o){
    if(o.poId || o.status==='R/C') return;
    var amt = num(o.qty)*num(o.estUnitPrice);
    if(amt>0) byCode[o.costCode]=(byCode[o.costCode]||0)+amt;
  });
  var topCodes = Object.keys(byCode).map(function(c){ return {code:c, val:byCode[c]}; }).sort(function(a,b){ return b.val-a.val; }).slice(0,6);
  var maxVal = topCodes.length ? topCodes[0].val : 1;

  var siteOpts = ['<option value="ALL"'+(dashSite==='ALL'?' selected':'')+'>All Projects</option>'].concat(
    state.settings.sites.map(function(s){ return '<option value="'+esc(s.name)+'"'+(dashSite===s.name?' selected':'')+'>'+esc(s.name)+'</option>'; })
  ).join('');

  return '' +
  '<div class="toolbar"><div class="field" style="max-width:320px;"><label>Project</label><select id="dashSiteSel">'+siteOpts+'</select></div></div>' +
  '<div class="stat-cards">' +
    statCard(openOrders,'Open Orders') +
    statCard(moneyShort(requestedSpend),'Requested (est.)') +
    statCard(pendingApproval,'POs Awaiting Approval') +
    statCard(moneyShort(committed),'Committed Spend') +
    statCard(moneyShort(invoicedTotal),'Total Invoiced') +
    statCard(flagged,'Invoices Flagged') +
  '</div>' +
  '<div class="grid grid-2">' +
    '<div class="panel">' +
      '<h2>Recent Orders</h2>' +
      (recentOrders.length ? recentOrdersTable(recentOrders) : '<div class="empty">No orders logged yet — add one from + New Order.</div>') +
    '</div>' +
    '<div class="panel">' +
      '<h2>Top Cost Codes (committed + requested)</h2>' +
      (topCodes.length ? topCodesBars(topCodes,maxVal) : '<div class="empty">Nothing coded yet.</div>') +
    '</div>' +
  '</div>' +
  '<div class="panel">' +
    '<h2>How this works</h2>' +
    '<div class="sub">Same simplified flow as before, now in one tool.</div>' +
    '<ol style="margin:0 0 0 18px;padding:0;line-height:1.9;font-size:13px;">' +
      '<li><b>+ New Order</b> — log what is needed, who needs it, which site and which cost code.</li>' +
      '<li><b>Orders</b> — select one or more logged orders (same supplier) and turn them into a <b>Purchase Order</b>.</li>' +
      '<li><b>Purchase Orders</b> — approval tier is calculated automatically from the order value; print/save as PDF once approved.</li>' +
      '<li><b>Invoices</b> — log the invoice against its PO number; value and cost-code split are checked automatically.</li>' +
      '<li><b>Cost Summary</b> — budget vs. committed vs. invoiced vs. paid, live, by cost code and by site.</li>' +
    '</ol>' +
  '</div>' +
  dashboardDataPanels() +
  '<h2 style="font-size:17px;border-bottom:2px solid var(--orange);padding-bottom:8px;margin:24px 0 14px;">Settings</h2>' +
  renderSettings();
}
function dashboardDataPanels(){
  var siteOpts = state.settings.sites.map(function(s){ return '<option value="'+esc(s.name)+'">'+esc(s.name)+'</option>'; }).join('');
  return '<div class="grid grid-2">' +
    '<div class="panel">' +
      '<h2>Backup &amp; Restore</h2>' +
      '<div class="sub">Everything is stored in this browser only. Back up regularly &mdash; a backup file contains all projects, orders, POs, invoices and settings.</div>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '<button class="btn btn-orange btn-sm" id="btnExportAll">Backup everything (JSON)</button>' +
        '<button class="btn btn-outline btn-sm" id="btnImportAll">Restore from backup</button>' +
      '</div>' +
    '</div>' +
    '<div class="panel">' +
      '<h2>Project Import / Export</h2>' +
      '<div class="sub">Move a single project between devices or share it. An export contains that project\'s orders, purchase orders, invoices and budgets.</div>' +
      '<div class="toolbar">' +
        '<div class="field" style="max-width:280px;"><label>Project</label><select id="projExportSel">'+siteOpts+'</select></div>' +
        '<button class="btn btn-outline btn-sm" id="btnExportProject" style="margin-bottom:1px;">Export Project</button>' +
        '<button class="btn btn-outline btn-sm" id="btnImportProject" style="margin-bottom:1px;">Import Project</button>' +
        '<button class="btn btn-outline btn-sm" id="btnImportBudget" style="margin-bottom:1px;">Import Budget</button>' +
      '</div>' +
      '<div class="footnote">Import Budget reads a cost estimate (Excel or CSV), matches its lines to cost codes and sets that project\'s budgets.</div>' +
    '</div>' +
  '</div>';
}
function exportProject(name){
  var site = siteByName(name);
  if(!site){ toast('Select a project to export.'); return; }
  var pos = state.pos.filter(function(p){ return p.site===name; });
  var poIds = {}; pos.forEach(function(p){ poIds[p.id]=true; });
  var data = {
    type:'antvic-project-export',
    version:1,
    exportedAt: new Date().toISOString(),
    site: site,
    budgets: state.settings.budgets[name]||{},
    orders: state.orders.filter(function(o){ return o.site===name; }),
    pos: pos,
    invoices: state.invoices.filter(function(i){ return poIds[i.poId]; }),
    poSeq: state.counters.poSeqBySite[site.code]||0
  };
  downloadBlob('Antvic Project '+name+' '+todayISO()+'.json', JSON.stringify(data,null,2), 'application/json');
  toast('Project "'+name+'" exported.');
}
function importProjectData(data){
  if(!data || data.type!=='antvic-project-export' || !data.site || !data.site.name){
    if(data && data.orders && data.settings){ toast('That is a full backup file \u2014 use Restore from backup instead.'); }
    else { toast('That file does not look like a valid project export.'); }
    return;
  }
  var name = data.site.name;
  var existing = siteByName(name);
  if(existing){
    if(!confirm('Project "'+name+'" already exists. Merge the imported orders, POs and invoices into it? Existing records are kept; duplicates are skipped.')) return;
  } else {
    state.settings.sites.push({ name:name, code:(data.site.code||name.slice(0,3).toUpperCase()), address:data.site.address||'' });
  }
  state.settings.budgets[name] = Object.assign({}, state.settings.budgets[name]||{}, data.budgets||{});
  var added = {orders:0, pos:0, invoices:0};
  (data.pos||[]).forEach(function(p){ if(!poById(p.id)){ p.site = name; state.pos.push(p); added.pos++; } });
  (data.orders||[]).forEach(function(o){ if(!orderById(o.id)){ o.site = name; state.orders.push(o); added.orders++; } });
  (data.invoices||[]).forEach(function(i){ if(!state.invoices.some(function(x){ return x.id===i.id; })){ state.invoices.push(i); added.invoices++; } });
  (data.orders||[]).concat(data.pos||[]).forEach(function(r){
    if(r.supplier && state.settings.suppliers.indexOf(r.supplier)===-1) state.settings.suppliers.push(r.supplier);
  });
  var code = siteCode(name);
  var maxSeq = state.counters.poSeqBySite[code]||0;
  if(num(data.poSeq)>maxSeq) maxSeq = num(data.poSeq);
  state.pos.forEach(function(p){
    var m = /^(.*)-(\d+)$/.exec(p.poNo||'');
    if(m && m[1]===code){ var sq = parseInt(m[2],10); if(sq>maxSeq) maxSeq = sq; }
  });
  state.counters.poSeqBySite[code] = maxSeq;
  save();
  render();
  toast('Project "'+name+'" imported: '+added.orders+' order(s), '+added.pos+' PO(s), '+added.invoices+' invoice(s).');
}
function statCard(n,l){ return '<div class="stat-card"><div class="n">'+esc(n)+'</div><div class="l">'+esc(l)+'</div></div>'; }
function recentOrdersTable(rows){
  var trs = rows.map(function(o){
    return '<tr><td data-label="Date">'+fmtDate(o.orderDate)+'</td><td data-label="Supplier">'+esc(o.supplier)+'</td><td data-label="Description">'+esc(o.description)+'</td>'+
      '<td data-label="Code">'+esc(o.costCode)+'</td><td data-label="Status">'+statusChip(o.status)+'</td></tr>';
  }).join('');
  return '<div class="table-wrap"><table class="stackable"><thead><tr><th>Date</th><th>Supplier</th><th>Description</th><th>Code</th><th>Status</th></tr></thead><tbody>'+trs+'</tbody></table></div>';
}
function topCodesBars(rows,maxVal){
  return rows.map(function(r){
    var pct = Math.max(4, Math.round(r.val/maxVal*100));
    return '<div style="margin-bottom:9px;">'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><b>'+esc(r.code)+'</b><span>'+money(r.val)+'</span></div>'+
      '<div style="background:#E5E9F0;border-radius:4px;height:9px;overflow:hidden;"><div style="width:'+pct+'%;background:var(--orange);height:100%;"></div></div>'+
    '</div>';
  }).join('');
}

function optionList(arr, selected){
  return arr.map(function(v){ return '<option value="'+esc(v)+'"'+(v===selected?' selected':'')+'>'+esc(v)+'</option>'; }).join('');
}
function costCodeOptions(selected){
  return COST_CODE_SECTIONS.map(function(sec){
    var opts = sec[1].map(function(c){ return '<option value="'+c[0]+'"'+(c[0]===selected?' selected':'')+'>'+c[0]+' — '+esc(c[1])+'</option>'; }).join('');
    return '<optgroup label="'+esc(sec[0])+'">'+opts+'</optgroup>';
  }).join('');
}
function siteOptions(selected){
  return state.settings.sites.map(function(s){ return '<option value="'+esc(s.name)+'"'+(s.name===selected?' selected':'')+'>'+esc(s.name)+'</option>'; }).join('');
}

function renderNewOrder(){
  var recent = state.orders.slice(-6).reverse();
  return '' +
  '<div class="grid grid-2">' +
  '<div class="panel">' +
    '<h2>New Order</h2>' +
    '<div class="sub">Log what is needed. Pick the cost code now, at the point of request — that is what makes reporting work later.</div>' +

function filteredOrders(){
  var f = state.ui.orderFilters;
  return state.orders.filter(function(o){

    if(f.unlinked && o.poId) return false;
    if(f.urgent && !o.urgent) return false;
    if(f.q){
      var q = f.q.toLowerCase();
      var hay = (o.description+' '+o.supplier+' '+o.orderedBy).toLowerCase();
      if(hay.indexOf(q)===-1) return false;

    return true;
  }).sort(function(a,b){ return (b.orderDate||'').localeCompare(a.orderDate||''); });
}

function recalcPoModal(){
  var rows = document.querySelectorAll('#poLinesBody tr');
  var subtotal = 0;
  rows.forEach(function(tr){
    var qty = num(tr.querySelector('.lnQty').value);
    var price = num(tr.querySelector('.lnPrice').value);
    var total = qty*price;
    tr.querySelector('.lnTotal').textContent = money(total);
    subtotal += total;
  });
  var discPct = num(document.getElementById('poDiscount').value);
  var vat = subtotal*0.20;
  var discount = subtotal*(discPct/100);
  var total = subtotal+vat-discount;
  document.getElementById('poSubtotalOut').textContent = money(subtotal);
  document.getElementById('poVatOut').textContent = money(vat);
  document.getElementById('poDiscOut').textContent = money(discount);
  document.getElementById('poTotalOut').textContent = money(total);
  var appr = approvalFor(total);
  document.getElementById('poApprovalOut').textContent = 'Tier '+appr.tier+' — '+appr.role;
}

function savePoFromModal(prefillOrders){
  var supplier = document.getElementById('poSupplier').value.trim();
  var site = document.getElementById('poSite').value;
  if(!supplier){ toast('Supplier is required.'); return; }
  var rows = document.querySelectorAll('#poLinesBody tr');
  var lines = [];
  rows.forEach(function(tr){
    var desc = tr.querySelector('.lnDesc').value.trim();
    if(!desc) return;
    lines.push({
      id: uid(),
      orderId: tr.dataset.orderId || null,
      description: desc,
      costCode: tr.querySelector('.lnCode').value,
      unit: tr.querySelector('.lnUnit').value,
      qty: num(tr.querySelector('.lnQty').value),
      unitPrice: num(tr.querySelector('.lnPrice').value),
      total: num(tr.querySelector('.lnQty').value)*num(tr.querySelector('.lnPrice').value)
    });
  });
  if(!lines.length){ toast('Add at least one line with a description.'); return; }

  if(!state.settings.suppliers.includes(supplier)) state.settings.suppliers.push(supplier);

  var supplierAddress = document.getElementById('poSupplierAddress').value.trim();
  var supplierPhone = document.getElementById('poSupplierPhone').value.trim();
  var supplierEmail = document.getElementById('poSupplierEmail').value.trim();
  state.settings.supplierContacts[supplier] = {address:supplierAddress, phone:supplierPhone, email:supplierEmail};

  var po = {
    id: uid(),
    poNo: nextPoNo(site),
    site: site,
    supplier: supplier,
    supplierAddress: supplierAddress,
    supplierPhone: supplierPhone,
    supplierEmail: supplierEmail,
    salesPerson: document.getElementById('poSalesPerson').value.trim(),
    date: document.getElementById('poDate').value || todayISO(),
    lines: lines,
    discountPct: num(document.getElementById('poDiscount').value),
    notes: document.getElementById('poNotes').value.trim(),
    authorisedBy: document.getElementById('poAuthBy').value.trim(),
    approvalStatus: 'Pending',
    approvedBy: '',
    approvedDate: ''
  };
  var totals = poTotals(po);
  var appr = approvalFor(totals.total);
  po.approvalTier = appr.tier;
  po.approverRole = appr.role;

  state.pos.push(po);
  lines.forEach(function(l){
    if(l.orderId){
      var o = orderById(l.orderId);
      if(o){ o.poId = po.id; if(o.status==='O') o.status='P'; }
    }
  });
  save();
  closeModal();
  toast('Purchase Order '+po.poNo+' created.');
  switchTab('pos');
}

function loadScriptOnce(url){
  return new Promise(function(resolve, reject){
    if(document.querySelector('script[src="'+url+'"]')) return resolve();
    var sc = document.createElement('script');
    sc.src = url; sc.onload = resolve; sc.onerror = reject;
    document.head.appendChild(sc);
  });
}

    loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')

    return window.html2canvas(holder, {scale:2, backgroundColor:'#ffffff'}).then(function(canvas){
      cleanup();
      var jsPDF = window.jspdf.jsPDF;
      var pdf = new jsPDF({unit:'mm', format:'a4'});
      var pw = 210, ph = 297, margin = 10;
      var iw = pw - margin*2;
      var ih = canvas.height * iw / canvas.width;
      var usable = ph - margin*2;
      var img = canvas.toDataURL('image/jpeg', 0.95);
      var remaining = ih, offset = 0, page = 0;
      while(remaining > 0){
        if(page > 0) pdf.addPage();
        pdf.addImage(img, 'JPEG', margin, margin - offset, iw, ih);
        offset += usable; remaining -= usable; page++;
      }
      pdf.save('Purchase Order '+po.poNo+' - '+(state.settings.companyName||'Antvic Ltd')+'.pdf');
      toast('PDF downloaded.');
    }).catch(function(e){ cleanup(); throw e; });

function computeSummaryRows(){
  var site = state.ui.summarySite;
  var committed = {}, invoiced = {}, paid = {}, requested = {};
  state.pos.forEach(function(p){
    if(p.approvalStatus==='Rejected') return;
    if(site!=='ALL' && p.site!==site) return;
    var bd = poCostBreakdown(p);
    Object.keys(bd).forEach(function(c){ committed[c]=(committed[c]||0)+bd[c]; });
  });
  state.invoices.forEach(function(inv){
    var po = poById(inv.poId);
    if(!po) return;
    if(site!=='ALL' && po.site!==site) return;
    var app = invoiceApportionment(inv);
    Object.keys(app).forEach(function(c){
      invoiced[c] = (invoiced[c]||0)+app[c];
      if(inv.paymentStatus==='Paid') paid[c] = (paid[c]||0)+app[c];
    });
  });
  // Orders not yet turned into a PO still move the numbers here (using their
  // estimated unit price), so the summary visibly changes the moment something
  // is logged rather than only once a full Purchase Order exists.
  state.orders.forEach(function(o){
    if(o.poId || o.status==='R/C') return;
    if(site!=='ALL' && o.site!==site) return;
    var amt = num(o.qty)*num(o.estUnitPrice);
    if(amt>0){ requested[o.costCode] = (requested[o.costCode]||0)+amt; }
  });
  var budgets = (site!=='ALL') ? (state.settings.budgets[site]||{}) : sumBudgetsAllSites();
  return FLAT_CODES.map(function(c){
    var budget = num(budgets[c.code]);
    var comm = committed[c.code]||0;
    var req = requested[c.code]||0;
    var inv = invoiced[c.code]||0;
    var pd = paid[c.code]||0;
    return { code:c.code, desc:c.desc, section:c.section, budget:budget, committed:comm, requested:req, invoiced:inv, paid:pd, remaining:budget-comm-req };
  });
}

function matchBudgetCode(label){
  var s = String(label).trim();
  if(!s) return null;
  var low0 = s.toLowerCase();
  if(/\btotal\b|\bsub-?total\b|\bsummary\b|cost plan|\bgia\b|\bvat\b|variation|advance payment|materials? on site|\bbtp\b|retention|previously certified|this application|payment application|\bless\b|building works costs|net building works|estimated project cost|works costs incl/.test(low0)) return null;
  var up = s.toUpperCase();
  if(CODE_SET[up]) return CODE_SET[up];
  var low = s.toLowerCase();
  for(var i=0;i<BUDGET_KEYWORDS.length;i++){
    if(low.indexOf(BUDGET_KEYWORDS[i][0])>-1) return BUDGET_KEYWORDS[i][1];
  }
  return null;
}
function rowsFromCsv(text){
  return text.split(/\r?\n/).map(function(line){
    var out=[], cur='', inQ=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(inQ){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=ch; }
      else if(ch==='"') inQ=true;
      else if(ch===','){ out.push(cur); cur=''; }
      else cur+=ch;
    }
    out.push(cur);
    return out;
  });
}
function parseNumCell(v){
  if(typeof v === 'number') return isFinite(v) ? v : 0;
  if(v===null || v===undefined) return 0;
  var s = String(v).replace(/[\u00a3,\s%]/g,'');
  if(!s) return 0;
  var n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function findTotalColumn(rows){
  var headers = ['total element','total cost','total (gbp)','budget (gbp)','total \u00a3','total','amount','cost'];
  for(var i=0; i<Math.min(rows.length, 30); i++){
    var row = rows[i];
    if(!row) continue;
    for(var h=0; h<headers.length; h++){
      for(var j=row.length-1; j>=0; j--){
        if(String(row[j]===undefined||row[j]===null?'':row[j]).trim().toLowerCase()===headers[h]) return j;
      }
    }
  }
  return -1;
}
function candidatesFromRows(rows){
  var out = [];
  var totCol = findTotalColumn(rows);
  rows.forEach(function(row){
    if(!row || !row.length) return;
    var label = null, amount = 0;
    if(totCol >= 0){
      // read the value ONLY from the sheet's total column
      amount = parseNumCell(row[totCol]);
      for(var j=0; j<row.length; j++){
        if(j===totCol) continue;
        var s0 = String(row[j]===undefined||row[j]===null?'':row[j]).trim();
        if(!label && /[A-Za-z][A-Za-z .&/'\u2019-]{2,}/.test(s0)){ label = s0; }
      }
    } else {
      // no total column found: fall back to the largest number in the row
      row.forEach(function(cell){
        if(cell===null || cell===undefined || cell==='') return;
        if(typeof cell === 'number'){ if(isFinite(cell) && cell>amount) amount=cell; return; }
        var s = String(cell).trim();
        var n = parseNumCell(s);
        if(n>0 && /^[\u00a3\d.,\s]+$/.test(s)){ if(n>amount) amount=n; return; }
        if(!label && /[A-Za-z][A-Za-z .&/'\u2019-]{2,}/.test(s)) label = s;
      });
    }
    if(label && amount>=1){
      out.push({label:label.slice(0,80), code:matchBudgetCode(label), amount:Math.round(amount*100)/100});
    }
  });
  var seen = {};
  return out.filter(function(c){
    var k = c.label.toLowerCase()+'|'+c.amount;
    if(seen[k]) return false;
    seen[k] = 1;
    return true;
  });
}
function importBudgetFromFile(file){
  var name = (file.name||'').toLowerCase();
  if(/\.csv$/.test(name)){
    var reader = new FileReader();
    reader.onload = function(){ openBudgetReview(candidatesFromRows(rowsFromCsv(reader.result)), file.name); };
    reader.readAsText(file);
    return;
  }
  toast('Reading spreadsheet...');
  loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js').then(function(){
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var wb = window.XLSX.read(reader.result, {type:'array', sheetRows:600});
        var names = wb.SheetNames.filter(function(n){ return !/cache/i.test(n); });
        function evalSheet(n){
          var cands = candidatesFromRows(window.XLSX.utils.sheet_to_json(wb.Sheets[n], {header:1, raw:true}));
          return {
            cands: cands,
            count: cands.filter(function(c){ return c.code; }).length,
            val: cands.reduce(function(s,c){ return s + (c.code ? c.amount : 0); },0),
            name: n
          };
        }
        // A summary/cost-plan sheet is flat (no parent+child double counting), so if one
        // exists and matches sensibly, always use it over detailed breakdown sheets.
        var best = null;
        var summSheets = names.filter(function(n){ return /summ/i.test(n); });
        for(var si=0; si<summSheets.length; si++){
          var r = evalSheet(summSheets[si]);
          if(r.count >= 3){ best = r; break; }
        }
        if(!best){
          names.forEach(function(n){
            var r = evalSheet(n);
            if(!best || r.count > best.count || (r.count === best.count && r.val > best.val)) best = r;
          });
        }
        openBudgetReview(best ? best.cands : [], file.name + (best ? ' \u2014 sheet: '+best.name : ''));
      }catch(err){ toast('Could not read that spreadsheet.'); }
    };
    reader.readAsArrayBuffer(file);
  }).catch(function(){
    toast('Reading Excel needs internet the first time. Alternatively save the estimate as CSV, or use the Budget Template.');
  });
}
function flagAggregates(cands){
  function tol(a){ return Math.max(2, a*0.002); }
  for(var i=0;i<cands.length;i++){
    var a = cands[i].amount;
    if(a < 1000) continue;
    var run = 0, k;
    for(k=i+1; k<cands.length && k<=i+25; k++){
      run += cands[k].amount;
      if(run > a + tol(a)) break;
      if(k>i+1 && Math.abs(run-a)<=tol(a)){ cands[i].agg = true; break; }
    }
    if(cands[i].agg) continue;
    run = 0;
    for(k=i-1; k>=0 && k>=i-25; k--){
      run += cands[k].amount;
      if(run > a + tol(a)) break;
      if(k<i-1 && Math.abs(run-a)<=tol(a)){ cands[i].agg = true; break; }
    }
  }
}

  var matched = cands.filter(function(c){ return c.code; }).length;
  var rows = cands.map(function(c, idx){
    var codeOpts = '<option value="">\u2014 skip \u2014</option>' + FLAT_CODES.map(function(fc){
      return '<option value="'+fc.code+'"'+(fc.code===c.code?' selected':'')+'>'+fc.code+' \u2014 '+esc(fc.desc)+'</option>';

      counts[code] = (counts[code]||0) + 1;
    });
    var keys = Object.keys(sums).sort(function(a,b){ return sums[b]-sums[a]; });

      '<div class="footnote" style="margin-top:6px;">"Lines" = how many estimate lines add into that code. Untick lines above to change this before applying.</div>';

    var site = document.getElementById('bimSite').value;
    if(!site){ toast('Pick a project.'); return; }
    var sums = {};
    document.querySelectorAll('.bimUse').forEach(function(cb){
      if(!cb.checked) return;
      var idx = cb.dataset.idx;
      var code = document.querySelector('.bimCode[data-idx="'+idx+'"]').value;
      if(!code) return;
      sums[code] = (sums[code]||0) + window._budgetCands[idx].amount;

    if(!nCodes){ toast('Nothing selected to import.'); return; }

    Object.keys(sums).forEach(function(code){ state.settings.budgets[site][code] = Math.round(sums[code]*100)/100; });
    save();

function downloadBlob(filename, content, mime){
  var blob = new Blob([content], {type:mime});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
}
function toCsv(rows, columns){
  // columns: either ['key1','key2',...] or [{key:'k',label:'Pretty Label'},...]
  var cols = columns.map(function(c){ return (typeof c === 'string') ? {key:c,label:c} : c; });
  function cell(v){
    if(v===undefined || v===null) return '';
    if(typeof v === 'number') return (Math.round(v*100)/100).toString();
    var s = String(v);
    // CSV/formula-injection guard: neutralise leading =,+,-,@ which spreadsheet apps may evaluate
    if(/^[=+\-@]/.test(s)) s = "'" + s;
    s = s.replace(/"/g,'""');
    if(s.indexOf(',')>-1 || s.indexOf('"')>-1 || s.indexOf('\n')>-1 || s.indexOf('\r')>-1) s = '"'+s+'"';
    return s;
  }
  var lines = [cols.map(function(c){ return cell(c.label); }).join(',')];
  rows.forEach(function(r){
    lines.push(cols.map(function(c){ return cell(r[c.key]); }).join(','));
  });
  // Prepend a UTF-8 BOM so Excel renders £, em-dashes etc. correctly instead of as mojibake.
  return '\ufeff' + lines.join('\r\n');
}

      if(po){
        var t = poTotals(po);
        infoEl.innerHTML = 'PO subtotal (ex VAT): <b>'+money(t.subtotal)+'</b> &middot; PO total (inc VAT): <b>'+money(t.total)+'</b> &middot; Cost codes: '+Object.keys(poCostBreakdown(po)).join(', ');
        document.getElementById('invVat').value = t.vat.toFixed(2);
      } else { infoEl.textContent=''; }
    }
    poSel.addEventListener('change', updatePoInfo);
    document.getElementById('invoiceForm').addEventListener('submit', function(e){
      e.preventDefault();
      var f = new FormData(e.target);
      if(!f.get('poId')){ toast('Select the Purchase Order this invoice belongs to.'); return; }
      var inv = {
        id: uid(), invoiceNo: f.get('invoiceNo'), date: f.get('date'), poId: f.get('poId'),
        net: num(f.get('net')), vat: num(f.get('vat')), paymentStatus: f.get('paymentStatus'),
        datePaid: f.get('datePaid'), notes: f.get('notes')
      };
      state.invoices.push(inv);
      save();
      toast('Invoice logged.');
      render();
    });
    document.querySelectorAll('.invStatusSel').forEach(function(sel){
      sel.addEventListener('change', function(){
        var inv = state.invoices.find(function(i){return i.id===sel.dataset.id;});
        if(inv){ inv.paymentStatus = sel.value; if(sel.value==='Paid' && !inv.datePaid) inv.datePaid = todayISO(); save(); }
        render();
      });
    });
    document.querySelectorAll('.delInvoice').forEach(function(btn){
      btn.addEventListener('click', function(){
        if(confirm('Delete this invoice?')){ state.invoices = state.invoices.filter(function(i){return i.id!==btn.dataset.id;}); save(); render(); }
      });
    });
  }
  else if(tab==='summary'){
    document.getElementById('summarySiteSel').addEventListener('change', function(e){ state.ui.summarySite = e.target.value; render(); });
    document.querySelectorAll('.budgetInput').forEach(function(inp){
      inp.addEventListener('change', function(){
        var site = state.ui.summarySite;
        if(site==='ALL'){ toast('Switch to a single site to set its budget.'); render(); return; }
        if(!state.settings.budgets[site]) state.settings.budgets[site] = {};
        state.settings.budgets[site][inp.dataset.code] = num(inp.value);
        save();
      });
    });
    var exBtn = document.getElementById('exportSummaryCsv');
    if(exBtn) exBtn.addEventListener('click', function(){
      var rows = computeSummaryRows();
      var csv = toCsv(rows, [
        {key:'code',label:'Cost Code'}, {key:'desc',label:'Description'}, {key:'section',label:'Section'},
        {key:'budget',label:'Budget (GBP)'}, {key:'requested',label:'Requested (GBP)'}, {key:'committed',label:'Committed (GBP)'},
        {key:'invoiced',label:'Invoiced (GBP)'}, {key:'paid',label:'Paid (GBP)'}, {key:'remaining',label:'Remaining (GBP)'}
      ]);
      downloadBlob('Antvic Cost Summary.csv', csv, 'text/csv;charset=utf-8;');
    });
    var impBtn = document.getElementById('importBudgetBtn');
    if(impBtn) impBtn.addEventListener('click', function(){ document.getElementById('importBudgetFile').click(); });
    var tplBtn = document.getElementById('budgetTemplateBtn');
    if(tplBtn) tplBtn.addEventListener('click', downloadBudgetTemplate);
  }
}

function wireSettingsEvents(){
    document.getElementById('addSiteBtn').addEventListener('click', function(){
      state.settings.sites.push({name:'New Site', code:'NEW', address:''}); save(); render();
    });
    function siteUsageCount(name){
      var n = 0;
      state.orders.forEach(function(o){ if(o.site===name) n++; });
      state.pos.forEach(function(p){ if(p.site===name) n++; });
      return n;
    }
    function renameSiteEverywhere(oldName, newName){
      if(oldName===newName) return;
      state.orders.forEach(function(o){ if(o.site===oldName) o.site = newName; });
      state.pos.forEach(function(p){ if(p.site===oldName) p.site = newName; });
      if(state.settings.budgets[oldName]){
        state.settings.budgets[newName] = state.settings.budgets[oldName];
        delete state.settings.budgets[oldName];
      }
      if(state.ui.summarySite===oldName) state.ui.summarySite = newName;
      if(state.ui.dashboardSite===oldName) state.ui.dashboardSite = newName;
    }
    document.querySelectorAll('.siteName').forEach(function(inp){
      inp.addEventListener('change', function(){
        var site = state.settings.sites[inp.dataset.idx];
        var oldName = site.name;
        var newName = inp.value.trim() || oldName;
        var used = siteUsageCount(oldName);
        if(used>0 && newName!==oldName){
          toast('Renamed '+oldName+' \u2192 '+newName+' \u2014 updated on '+used+' existing order(s)/PO(s).');
        }
        renameSiteEverywhere(oldName, newName);
        site.name = newName;
        save(); render();
      });
    });
    document.querySelectorAll('.siteCode').forEach(function(inp){ inp.addEventListener('change', function(){ state.settings.sites[inp.dataset.idx].code = inp.value.toUpperCase(); save(); }); });
    document.querySelectorAll('.siteAddr').forEach(function(inp){ inp.addEventListener('change', function(){ state.settings.sites[inp.dataset.idx].address = inp.value; save(); }); });
    document.querySelectorAll('.rmSite').forEach(function(btn){
      btn.addEventListener('click', function(){
        var site = state.settings.sites[btn.dataset.idx];
        var used = siteUsageCount(site.name);
        if(used>0){
          toast('Cannot remove "'+site.name+'" \u2014 '+used+' order(s)/PO(s) still reference it.');
          return;
        }
        if(confirm('Remove site "'+site.name+'"?')){ state.settings.sites.splice(btn.dataset.idx,1); save(); render(); }
      });
    });

    document.getElementById('saveLimitsBtn').addEventListener('click', function(){
      document.querySelectorAll('.limRole').forEach(function(inp){
        var lim = state.settings.approvalLimits.find(function(l){return l.tier==inp.dataset.tier;});
        if(lim) lim.role = inp.value;
      });
      document.querySelectorAll('.limUpto').forEach(function(inp){
        var lim = state.settings.approvalLimits.find(function(l){return l.tier==inp.dataset.tier;});
        if(lim) lim.upTo = inp.value===''? null : num(inp.value);
      });
      save(); toast('Approval limits saved.'); render();
    });

    document.getElementById('addSupplierForm').addEventListener('submit', function(e){
      e.preventDefault(); var v=new FormData(e.target).get('val').trim();
      if(v && !state.settings.suppliers.includes(v)){ state.settings.suppliers.push(v); save(); render(); }
    });
    document.querySelectorAll('.rmSupplier').forEach(function(btn){ btn.addEventListener('click', function(){ state.settings.suppliers.splice(btn.dataset.idx,1); save(); render(); }); });
    document.getElementById('addPlacerForm').addEventListener('submit', function(e){
      e.preventDefault(); var v=new FormData(e.target).get('val').trim();
      if(v && !state.settings.orderPlacers.includes(v)){ state.settings.orderPlacers.push(v); save(); render(); }
    });
    document.querySelectorAll('.rmPlacer').forEach(function(btn){ btn.addEventListener('click', function(){ state.settings.orderPlacers.splice(btn.dataset.idx,1); save(); render(); }); });

    document.getElementById('expOrdersCsv').addEventListener('click', function(){
      var rows = state.orders.map(function(o){
        var po = o.poId ? poById(o.poId) : null;
        return {
          no:o.no, orderDate:o.orderDate, site:o.site, supplier:o.supplier, codeLink:o.codeLink,
          description:o.description, qty:o.qty, unit:o.unit, costCode:o.costCode, orderedBy:o.orderedBy,
          statusLabel:statusLabel(o.status), urgentLabel:(o.urgent?'Yes':'No'), estDelivery:o.estDelivery, deliveredDate:o.deliveredDate,
          comments:o.comments, poNo: po ? po.poNo : ''
        };
      });
      var csv = toCsv(rows, [
        {key:'no',label:'No.'}, {key:'orderDate',label:'Date'}, {key:'site',label:'Site / Project'},
        {key:'supplier',label:'Supplier'}, {key:'codeLink',label:'Code / Link'}, {key:'description',label:'Description'},
        {key:'qty',label:'Qty'}, {key:'unit',label:'Unit'}, {key:'costCode',label:'Cost Code'},
        {key:'orderedBy',label:'Ordered By'}, {key:'statusLabel',label:'Delivery Status'}, {key:'urgentLabel',label:'Urgent'},
        {key:'estDelivery',label:'Estimated Delivery'}, {key:'deliveredDate',label:'Delivered Date'},
        {key:'comments',label:'Comments'}, {key:'poNo',label:'PO Number'}
      ]);
      downloadBlob('Antvic Orders.csv', csv, 'text/csv;charset=utf-8;');
    });
    document.getElementById('expPosCsv').addEventListener('click', function(){
      var rows = state.pos.map(function(p){
        var t=poTotals(p);
        return {poNo:p.poNo,date:p.date,site:p.site,supplier:p.supplier,subtotal:t.subtotal,vat:t.vat,total:t.total,
          approvalTier:p.approvalTier,approverRole:p.approverRole,approvalStatus:p.approvalStatus,
          invoiced:poInvoicedTotal(p.id), paid:poPaidTotal(p.id)};
      });
      var csv = toCsv(rows, [
        {key:'poNo',label:'PO Number'}, {key:'date',label:'Date'}, {key:'site',label:'Site / Project'},
        {key:'supplier',label:'Supplier'}, {key:'subtotal',label:'Subtotal (GBP)'}, {key:'vat',label:'VAT (GBP)'},
        {key:'total',label:'Total Inc VAT (GBP)'}, {key:'approvalTier',label:'Approval Tier'},
        {key:'approverRole',label:'Approver Role'}, {key:'approvalStatus',label:'Approval Status'},
        {key:'invoiced',label:'Invoiced (GBP)'}, {key:'paid',label:'Paid (GBP)'}
      ]);
      downloadBlob('Antvic Purchase Orders.csv', csv, 'text/csv;charset=utf-8;');
    });
    document.getElementById('expInvCsv').addEventListener('click', function(){
      var rows = state.invoices.map(function(i){
        var po=poById(i.poId);
        return {invoiceNo:i.invoiceNo,date:i.date,poNo:po?po.poNo:'',supplier:po?po.supplier:'',
          net:i.net,vat:i.vat,gross:num(i.net)+num(i.vat),matchFlag:invoiceFlag(i),
          paymentStatus:i.paymentStatus,datePaid:i.datePaid,notes:i.notes};
      });
      var csv = toCsv(rows, [
        {key:'invoiceNo',label:'Invoice No.'}, {key:'date',label:'Date Received'}, {key:'poNo',label:'PO Number'},
        {key:'supplier',label:'Supplier'}, {key:'net',label:'Net (GBP)'}, {key:'vat',label:'VAT (GBP)'},
        {key:'gross',label:'Gross (GBP)'}, {key:'matchFlag',label:'PO Match'},
        {key:'paymentStatus',label:'Payment Status'}, {key:'datePaid',label:'Date Paid'}, {key:'notes',label:'Notes'}
      ]);
      downloadBlob('Antvic Invoices.csv', csv, 'text/csv;charset=utf-8;');
    });
    document.getElementById('resetDataBtn').addEventListener('click', function(){
      if(confirm('This will permanently erase ALL orders, purchase orders and invoices in this browser. Continue?')){
        if(confirm('Are you absolutely sure? This cannot be undone.')){
          localStorage.removeItem(STORAGE_KEY); state = defaultState(); save(); render(); toast('All data erased.');
        }
      }
    });
}

document.getElementById('importFile').addEventListener('change', function(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var data = JSON.parse(reader.result);
      if(!data.orders || !data.pos || !data.settings){ toast('That file does not look like a valid backup.'); return; }
      if(confirm('Restore from this backup? This will replace all current data.')){
        state = data;
        if(!state.ui) state.ui = defaultState().ui;
        if(!state.settings.budgets) state.settings.budgets = {};
        save(); render(); toast('Backup restored.');
      }
    }catch(err){ toast('Could not read that file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});
document.getElementById('importProjectFile').addEventListener('change', function(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var data = JSON.parse(reader.result);
      importProjectData(data);
    }catch(err){ toast('Could not read that file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});
document.getElementById('importBudgetFile').addEventListener('change', function(e){
  var file = e.target.files[0];
  if(!file) return;
  importBudgetFromFile(file);
  e.target.value = '';
});
function closeMobileNav(){
  document.getElementById('tabs').classList.remove('open');
  document.getElementById('navToggle').setAttribute('aria-expanded','false');
}
document.getElementById('logoHome').addEventListener('click', function(){
  switchTab('dashboard');
  closeMobileNav();
  window.scrollTo(0,0);
});
document.addEventListener('click', function(e){
  var nav = document.getElementById('tabs');
  if(nav.classList.contains('open') && !e.target.closest('#siteHeader')) closeMobileNav();
});

document.querySelectorAll('#tabs button').forEach(function(b){ b.addEventListener('click', function(){ switchTab(b.dataset.tab); document.getElementById('tabs').classList.remove('open'); document.getElementById('navToggle').setAttribute('aria-expanded','false'); }); });
document.getElementById('navToggle').addEventListener('click', function(){
  var nav = document.getElementById('tabs');
  var isOpen = nav.classList.toggle('open');
  this.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});

load();
switchTab(state.ui.activeTab || 'dashboard');

</script>
